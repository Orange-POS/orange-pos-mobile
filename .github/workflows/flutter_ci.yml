name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify dependencies
        run: flutter pub deps

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test with coverage
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          retention-days: 7


  build-ios:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    needs: analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Show build tools
        run: |
          flutter --version
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Write Firebase iOS config
        if: ${{ env.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 != '' }}
        env:
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Build iOS without codesign
        run: flutter build ios --release --no-codesign --dart-define=APP_ENV=production

      - name: Upload unsigned iOS build
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-build
          path: build/ios/iphoneos
          retention-days: 3